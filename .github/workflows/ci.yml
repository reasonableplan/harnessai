name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync --dev

      - name: Ruff lint
        working-directory: backend
        run: uv run ruff check src/ tests/

      - name: Ruff format check
        working-directory: backend
        run: uv run ruff format --check src/ tests/

      - name: Pyright type check
        working-directory: backend
        run: uv run pyright src/

      - name: Pytest
        working-directory: backend
        run: uv run pytest tests/ --rootdir=. -q

      - name: Harness schema validation
        run: python harness/bin/harness validate

      - name: Gate coverage benchmark
        run: uv --project backend run python scripts/gate_benchmark.py

  install-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install snapshot test
        run: bash tests/install/test_install_snapshot.sh
