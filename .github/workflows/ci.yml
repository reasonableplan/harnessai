name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: agent_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d agent_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/agent_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          cache: true

      - name: Install dependencies
        working-directory: backend
        run: uv sync --dev

      - name: Lint
        working-directory: backend
        run: uv run ruff check src/ tests/

      - name: Lint format
        working-directory: backend
        run: uv run ruff format --check src/ tests/

      - name: Run migrations
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Test with coverage
        working-directory: backend
        run: uv run pytest --tb=short -q --cov=src --cov-report=term-missing --cov-fail-under=60
